spring:
  datasource:
    url: jdbc:mysql://localhost:3306/suivicargo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:suivicargo}
    password: ${DB_PASSWORD:suivicargo}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate    # Schéma géré par Flyway uniquement
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}        # Mailhog/MailDev en dev
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# CORS pour le front Angular en dev (par défaut Angular sert sur 4200)
app:
  cors:
    allowed-origins: http://localhost:4200,http://localhost:5173
